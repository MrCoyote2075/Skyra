<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skyra - Secure Exam Environment</title>

  <style>
    /* 🎨 COLOR VARIABLES & FONTS */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    :root {
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --bg-dark: #0f172a;
      --bg-darker: #020617;
      --surface: rgba(30, 41, 59, 0.7);
      --surface-border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --danger: #ef4444;
      --danger-hover: #dc2626;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      /* Deep radial gradient background */
      background: radial-gradient(circle at top center, var(--bg-dark), var(--bg-darker) 100%);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 🔷 HEADER (Glassmorphism effect) */
    .header {
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--surface-border);
      padding: 0 30px;
      box-sizing: border-box;
      z-index: 1000;
    }

    /* LEFT SIDE */
    .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
      /* Gradient text */
      background: linear-gradient(to right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .badge {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 12px;
      border: 1px solid rgba(16, 185, 129, 0.3);
      margin-left: 8px;
      letter-spacing: 0.5px;
    }

    /* RIGHT SIDE BUTTONS */
    .right {
      display: flex;
      gap: 12px;
    }

    .btn-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .refresh {
      background-color: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border: 1px solid var(--surface-border);
    }

    .refresh:hover {
      background-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-1px);
    }

    .exit {
      background-color: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .exit:hover {
      background-color: var(--danger);
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    /* 🔽 MAIN CONTENT */
    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* Abstract background glow behind the card */
    .glow-circle {
      position: absolute;
      width: 400px;
      height: 400px;
      background: var(--primary);
      border-radius: 50%;
      filter: blur(150px);
      opacity: 0.15;
      z-index: 0;
    }

    /* The Login Card */
    .login-card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--surface-border);
      border-radius: 20px;
      padding: 50px 40px;
      width: 360px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      z-index: 1;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Lock Icon Styling */
    .icon-container {
      width: 64px;
      height: 64px;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px auto;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    h2 {
      margin: 0 0 8px 0;
      font-size: 24px;
      font-weight: 700;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin: 0 0 30px 0;
    }

    /* Input Styling */
    .input-group {
      text-align: left;
      margin-bottom: 24px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--surface-border);
      border-radius: 10px;
      color: white;
      box-sizing: border-box;
      transition: all 0.2s ease;
      outline: none;
      font-family: inherit;
      text-align: center;
      letter-spacing: 2px;
      font-weight: 600;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.3);
      font-weight: 400;
      letter-spacing: normal;
    }

    input:focus {
      border-color: var(--primary);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    /* Start Button Styling */
    button.start {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    button.start:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
    }
    
    button.start:active {
      transform: translateY(0);
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="left">
      <img src="assets/logo1.png" class="logo" alt="Logo" onerror="this.style.display='none'" />
      <div class="title">Skyra</div>
      <div class="badge">SECURE MODE</div>
    </div>

    <div class="right">
      <button class="btn-header refresh" onclick="refreshExam()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.44l5.46 5.46"/></svg>
        Refresh
      </button>
      <button class="btn-header exit" onclick="exitExam()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Exit
      </button>
    </div>
  </div>

  <div class="container">
    <div class="glow-circle"></div> <div class="login-card">
      <div class="icon-container">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      
      <h2>Join Contest</h2>
      <p class="subtitle">Enter your secure access code to begin</p>

      <div class="input-group">
        <label for="code">Access Code</label>
        <input type="text" id="code" placeholder="e.g. X7B-9Q2" autocomplete="off" />
      </div>
      
      <button class="start" onclick="startExam()">Launch Exam securely</button>
    </div>
  </div>

  <script>
    function startExam() {
      const code = document.getElementById("code").value;
      if (!code) {
        alert("Please enter a code");
        return;
      }
      window.electronAPI.startExam(code);
    }

    function exitExam() {
      window.electronAPI.exitExam();
    }

    function refreshExam() {
      window.electronAPI.refreshExam();
    }
  </script>

</body>
</html>
